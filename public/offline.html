<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UniFlow — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #030303;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      gap: 1rem;
    }
    .logo {
      width: 72px;
      height: 72px;
      background: #7b68ee;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    h1 { font-size: 1.5rem; font-weight: 700; }
    p { color: rgba(255,255,255,0.5); font-size: 0.9rem; line-height: 1.6; max-width: 300px; }
    button {
      margin-top: 0.5rem;
      padding: 0.75rem 2rem;
      background: #7b68ee;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="logo">U</div>
  <h1>You're offline</h1>
  <p>Check your internet connection and try again. Some content may be available from cache.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
